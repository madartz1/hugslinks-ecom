<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>HUGS Admin Dashboard</title><link rel="stylesheet" href="/styles.css"/><link rel="stylesheet" href="/admin.css"/></head><body><div class="gold-particles"></div><div class="blue-hearts-container" id="blueHearts"></div><main class="admin-shell"><aside class="admin-sidebar"><h2>HUGS Admin</h2><a href="/">Home</a><a href="/shop.html">Shop</a><a href="#dashboard">Dashboard</a><a href="#products">Products</a><a href="#orders">Orders</a></aside><section class="admin-main"><header class="admin-header"><div><h1>Dashboard</h1><p class="muted">Manage products, inventory, uploads, and sales.</p></div></header><section id="dashboard" class="analytics-grid"><div class="analytics-card"><span>Total Revenue</span><strong id="totalRevenue">$0</strong></div><div class="analytics-card"><span>Total Orders</span><strong id="totalOrders">0</strong></div><div class="analytics-card"><span>Total Products</span><strong id="totalProducts">0</strong></div><div class="analytics-card"><span>Low Stock</span><strong id="lowStock">0</strong></div></section><section id="products" class="admin-panel"><h2>Product Manager</h2><div class="product-form"><input id="productName" placeholder="Product name"/><input id="productPrice" type="number" placeholder="Price"/><input id="productStock" type="number" placeholder="Stock"/><textarea id="productDescription" placeholder="Description"></textarea><input id="productImage" type="file" accept="image/*"/><button class="btn primary" onclick="createProduct()">Add Product</button></div><div id="productList" class="admin-list"></div></section><section id="orders" class="admin-panel"><h2>Recent Orders</h2><div id="orderList" class="admin-list"></div></section></section></main><script src="/admin.js"></script><script>
const heartsContainer = document.getElementById("blueHearts");
function createHeart(){ if(!heartsContainer) return; const heart=document.createElement("div"); heart.classList.add("blue-heart"); heart.innerHTML="❤"; heart.style.left=Math.random()*100+"vw"; heart.style.fontSize=(10+Math.random()*18)+"px"; heart.style.animationDuration=(10+Math.random()*12)+"s"; heart.style.opacity=.4+Math.random()*.4; heartsContainer.appendChild(heart); setTimeout(()=>heart.remove(),22000);}
setInterval(createHeart,1200);
</script></body></html>
